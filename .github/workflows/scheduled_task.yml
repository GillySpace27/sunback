name: Scheduled Task

on:
  schedule:
    - cron: '*/10 * * * *'  # Runs every 10 minutes
  workflow_dispatch:        # Allows manual triggering

jobs:
  run-task:
    runs-on: macos-14

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12.7'  # Specify your required Python version

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-exact.txt

      - name: Install repository as a package
        run: |
          pip install .

      - name: Configure AWS credentials for OIDC
        id: aws-creds
        uses: aws-actions/configure-aws-credentials@v2-next
        with:
          role-to-assume: arn:aws:iam::940506845164:role/Github_Web_Identity
          aws-region: us-east-2  # Change to your bucket's region if it's different

      - name: Execute script
        run: |
          python sunback/run/run_server_github.py
